name: release

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA on main to backfill release for
        required: true
        type: string

permissions:
  contents: write
  issues: read
  packages: write
  pull-requests: read

env:
  RELEASE_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: resolve release head sha
        id: release-head
        shell: bash
        run: |
          set -euo pipefail
          target_sha="${RELEASE_HEAD_SHA}"
          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid head_sha: ${target_sha}" >&2
            exit 1
          fi
          echo "release_head_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_REQUESTED_SHA=${target_sha}"
          echo "RELEASE_TARGET_SHA=${target_sha}"

      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release-head.outputs.release_head_sha }}

      - name: determine release intent (labels)
        id: intent
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ env.RELEASE_HEAD_SHA }}
        run: bash ./.github/scripts/release-intent.sh

      - name: summary (release intent)
        if: always()
        shell: bash
        run: |
          {
            echo "### Release intent"
            echo "- trigger: ${{ github.event_name }}"
            echo "- head_sha: ${{ env.RELEASE_HEAD_SHA }}"
            echo "- pr: #${{ steps.intent.outputs.pr_number }} (${{ steps.intent.outputs.pr_url }})"
            echo "- intent_label: ${{ steps.intent.outputs.release_intent_label }}"
            echo "- is_prerelease: ${{ steps.intent.outputs.is_prerelease }}"
            echo "- should_release: ${{ steps.intent.outputs.should_release }}"
            echo "- bump_level: ${{ steps.intent.outputs.bump_level }}"
            echo "- reason: ${{ steps.intent.outputs.reason }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: skip release (intent says no)
        if: steps.intent.outputs.should_release != 'true'
        # Quote as YAML scalar (plain scalars cannot contain ': ').
        run: 'echo "skip release: intent says no"'

      - name: compute version
        id: version
        shell: bash
        if: steps.intent.outputs.should_release == 'true'
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          IS_PRERELEASE: ${{ steps.intent.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/compute-version.sh
          .github/scripts/compute-version.sh

      - name: prepare docker image tags
        id: image
        if: steps.intent.outputs.should_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.intent.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/xp"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:v${VERSION}"
            echo "${image}:${VERSION}"
            if [[ "${IS_PRERELEASE}" != "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: configure git user
        if: steps.intent.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: create and push tag (if missing)
        if: steps.intent.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.version }}"
          target_sha="$(git rev-parse "${RELEASE_HEAD_SHA}^{commit}")"
          echo "target tag: $tag"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing_tag_sha="$(git rev-list -n 1 "${tag}^{commit}")"
            if [[ "${existing_tag_sha}" != "${target_sha}" ]]; then
              echo "tag ${tag} already exists on ${existing_tag_sha}, expected ${target_sha}" >&2
              exit 1
            fi
            echo "tag exists on target commit: ${tag}"
            exit 0
          fi
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

      - name: setup rust
        if: steps.intent.outputs.should_release == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: rustfmt
        if: steps.intent.outputs.should_release == 'true'
        env:
          XP_BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: cargo fmt --check

      - name: setup bun
        if: steps.intent.outputs.should_release == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: build embedded web assets
        if: steps.intent.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile
          bun run build

      - name: clippy
        if: steps.intent.outputs.should_release == 'true'
        env:
          XP_BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: cargo clippy -- -D warnings

      - name: test
        if: steps.intent.outputs.should_release == 'true'
        env:
          XP_BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: cargo test

      - name: install cross
        if: steps.intent.outputs.should_release == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: build assets (linux musl)
        if: steps.intent.outputs.should_release == 'true'
        shell: bash
        env:
          XP_EFFECTIVE_VERSION: ${{ steps.version.outputs.version }}
          XP_BUILD_VERSION: ${{ steps.version.outputs.version }}
          CROSS_CONTAINER_OPTS: -e XP_BUILD_VERSION=${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p release

          # NOTE: Use separate CARGO_TARGET_DIR per target to avoid reusing host build-script
          # binaries across different cross images (glibc version mismatch).
          export CARGO_TARGET_DIR=target/cross-x86_64-unknown-linux-musl
          cross build --release --locked --target x86_64-unknown-linux-musl --bin xp
          cross build --release --locked --target x86_64-unknown-linux-musl --bin xp-ops
          cp "${CARGO_TARGET_DIR}/x86_64-unknown-linux-musl/release/xp" release/xp-linux-x86_64
          cp "${CARGO_TARGET_DIR}/x86_64-unknown-linux-musl/release/xp-ops" release/xp-ops-linux-x86_64

          export CARGO_TARGET_DIR=target/cross-aarch64-unknown-linux-musl
          cross build --release --locked --target aarch64-unknown-linux-musl --bin xp
          cross build --release --locked --target aarch64-unknown-linux-musl --bin xp-ops
          cp "${CARGO_TARGET_DIR}/aarch64-unknown-linux-musl/release/xp" release/xp-linux-aarch64
          cp "${CARGO_TARGET_DIR}/aarch64-unknown-linux-musl/release/xp-ops" release/xp-ops-linux-aarch64

          cd release
          sha256sum xp-* > checksums.txt

      - name: setup qemu
        if: steps.intent.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: setup buildx
        if: steps.intent.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: login ghcr
        if: steps.intent.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: publish ghcr image
        if: steps.intent.outputs.should_release == 'true'
        timeout-minutes: 60
        uses: docker/build-push-action@v6
        env:
          # Work around docker/build-push-action post-build hangs introduced by the
          # new build record export path in v6.17+.
          # Upstream: https://github.com/docker/build-push-action/issues/1388
          DOCKER_BUILD_EXPORT_LEGACY: true
        with:
          context: .
          file: ./Dockerfile
          target: runtime-from-prebuilt
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            XP_BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: create release
        if: steps.intent.outputs.should_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.intent.outputs.is_prerelease }}
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: release/*
          artifactErrorsFailBuild: true
          replacesArtifacts: true
