proxy-providers:
  ProviderA:
    type: http
    path: ./ProviderA.yaml
    url: https://provider-a.example.com/subscription
    interval: 60
    health-check:
      enable: true
      url: https://cp.cloudflare.com
      interval: 30
      timeout: 1000
      expected-status: 204
      lazy: false
  ProviderB:
    type: http
    path: ./ProviderB.yaml
    url: https://provider-b.example.com/subscription
    interval: 60
    health-check:
      enable: true
      url: https://cp.cloudflare.com
      interval: 30
      timeout: 1000
      expected-status: 204
      lazy: false

listeners:
  - name: bt-socks-in
    type: socks
    port: 7897
    listen: 127.0.0.1
    udp: true
    rule: bt
  - name: ai-socks-in
    type: socks
    port: 7898
    listen: 127.0.0.1
    udp: true
    rule: ai-socks

port: 0
socks-port: 0
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:5050
tcp-concurrent: true
unified-delay: true
global-client-fingerprint: chrome

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - any:853

dns:
  enable: true
  prefer-h3: false
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - localhost.ptlogin2.qq.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.googleapis.com
    - +.googleapis.cn
    - +.argotunnel.com
    - alt1-mtalk.google.com
    - alt2-mtalk.google.com
    - alt3-mtalk.google.com
    - alt4-mtalk.google.com
    - alt5-mtalk.google.com
    - alt6-mtalk.google.com
    - alt7-mtalk.google.com
    - alt8-mtalk.google.com
    - mtalk.google.com
  use-hosts: true
  default-nameserver:
    - 114.114.114.114#DIRECT
    - 223.5.5.5#DIRECT
    - 119.29.29.29#DIRECT
    - 180.76.76.76#DIRECT
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  nameserver:
    - https://cloudflare-dns.com/dns-query#🌟 节点选择
  fallback:
    - https://doh.pub/dns-query#DIRECT
    - https://cloudflare-dns.com/dns-query#DIRECT
  nameserver-policy:
    ntp.aliyun.com: https://dns.alidns.com/dns-query#DIRECT
    +.jsdmirror.com: https://dns.alidns.com/dns-query#DIRECT
    fastly.jsdelivr.net: https://dns.alidns.com/dns-query#DIRECT
    +.msftconnecttest.com,+.msftncsi.com: https://cloudflare-dns.com/dns-query#🌟 节点选择
    +.googleapis.com,+.googleapis.cn: https://cloudflare-dns.com/dns-query#🌟 节点选择
    rule-set:ProxyGFWlist: https://cloudflare-dns.com/dns-query#🌟 节点选择
    rule-set:ChinaDomain: https://dns.alidns.com/dns-query#DIRECT
    rule-set:OwnerDirect: https://dns.alidns.com/dns-query#DIRECT

proxy-groups:
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🌟 节点选择
      - 🔒 高质量
      - 🗽 大流量
      - 🎯 全球直连
      - 🛑 全球拦截
  - name: 🗽 大流量
    type: fallback
    use:
      - ProviderB
    timeout: 300
    filter: 新加坡|🇸🇬|Singapore|SG|日本|🇯🇵|Japan|JP|美国|🇺🇸|USA|US|United States
    exclude-filter: 倍|x[2-9]|[2-9]x|x\d{2,}|\d{2,}x|\.\dx
    lazy: true
    disable-udp: false
    interval: 60
    url: https://hub.docker.com/v2/namespaces/library/repositories/hello-world/tags
    expected-status: 200
